spring:
  application:
    name: routely
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/routely}
    username: ${SPRING_DATASOURCE_USERNAME:routely}
    password: ${SPRING_DATASOURCE_PASSWORD:routely}
  jpa:
    hibernate:
      ddl-auto: none
    # RoutePlan/RouteStop expose lazy associations (stops, stop.customer) that
    # the read endpoints serialize straight from freshly loaded entities, with
    # no @Transactional wrapping the controller. Keeping the session open for
    # the view avoids a LazyInitializationException on GET /route-plans and
    # GET /route-plans/{id}; the honest fix is an explicit fetch-join in the
    # repository, but that's outside what this fix is scoped to touch.
    open-in-view: true
  mvc:
    problemdetails:
      enabled: true
  flyway:
    enabled: true

routely:
  security:
    jwt-secret: ${ROUTELY_JWT_SECRET:routely-dev-only-secret-key-change-me-0123456789abcdef0123456789}
